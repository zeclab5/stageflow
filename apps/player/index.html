<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StageFlow Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e5e7eb;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }
    #video {
      max-width: 100%;
      max-height: 100%;
    }
    #controls {
      background: #1a1a24;
      padding: 16px;
      border-top: 1px solid #2a2a35;
    }
    .btn {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 8px 16px;
      margin-right: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #4b5563; cursor: not-allowed; }
    input[type="file"] { color: #e5e7eb; }
    #time { margin-left: 12px; font-family: monospace; }
    #status { margin-left: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div id="app">
    <div id="video-container">
      <video id="video" controls></video>
    </div>
    <div id="controls">
      <input type="file" id="file-input" accept="video/*" />
      <button class="btn" id="play-btn">Play</button>
      <button class="btn" id="pause-btn">Pause</button>
      <button class="btn" id="stop-btn">Stop</button>
      <span id="time">00:00 / 00:00</span>
      <span id="status">Ready</span>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
